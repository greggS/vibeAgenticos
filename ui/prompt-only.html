<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgenticOS Prompt</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 80px; overflow: hidden;
    background: #0f111e;
    font-family: -apple-system, "Inter", system-ui, sans-serif;
    display: flex; flex-direction: column;
  }

  /* ── Status strip (slides down from top) ─────────────────────── */
  #status-strip {
    width: 100%; height: 0; overflow: hidden;
    background: rgba(99,102,241,0.07);
    border-bottom: 1px solid rgba(99,102,241,0.12);
    transition: height 0.22s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #status-strip.active { height: 24px; }

  #status-inner {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: rgba(165,180,252,0.8);
    letter-spacing: 0.04em;
  }

  /* Pulsing dot */
  .s-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #818cf8; flex-shrink: 0;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  /* Bouncing dots for "thinking" */
  .dots span {
    display: inline-block; width: 3px; height: 3px; border-radius: 50%;
    background: #818cf8; margin: 0 1px; vertical-align: middle;
    animation: bounce 1.1s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.16s; }
  .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-4px); }
  }

  /* Streaming bar */
  .stream-bar {
    width: 60px; height: 2px; border-radius: 1px;
    background: rgba(99,102,241,0.2); overflow: hidden; display: none;
  }
  .stream-bar-fill {
    height: 100%; background: #818cf8; border-radius: 1px;
    animation: stream 1.2s ease-in-out infinite;
    transform-origin: left;
  }
  @keyframes stream {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  /* ── Main bar ─────────────────────────────────────────────────── */
  #bar {
    flex: 1; display: flex; align-items: center;
    padding: 0 14px; gap: 10px;
    border-top: 1px solid rgba(99,102,241,0.2);
  }

  /* Status dot */
  #dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4b5563; flex-shrink: 0;
    transition: background 0.4s, box-shadow 0.4s;
  }
  #dot.ok  { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.5); }
  #dot.off { background: #f87171; }

  /* Input */
  #input-wrap { flex: 1; position: relative; display: flex; align-items: center; }
  #prompt {
    width: 100%; padding: 9px 20px;
    font-size: 15px;
    border: 1px solid rgba(99,102,241,0.25); border-radius: 9999px;
    background: rgba(99,102,241,0.08); color: #e8eaf0;
    outline: none; transition: border-color 0.2s, background 0.2s;
    font-family: inherit;
  }
  #prompt::placeholder { color: rgba(150,160,200,0.4); }
  #prompt:focus { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.12); }

  /* Buttons */
  #send, #mic {
    height: 38px; border: none; border-radius: 9999px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    flex-shrink: 0; transition: all 0.15s; font-family: inherit;
  }
  #send { padding: 0 20px; background: #6366f1; color: white; letter-spacing: 0.01em; }
  #send:hover  { background: #7c7ff5; }
  #send:active { background: #4f52d8; transform: scale(0.97); }
  #mic {
    width: 38px; background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    color: rgba(150,160,200,0.7);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  #mic:hover     { background: rgba(99,102,241,0.18); color: #e8eaf0; }
  #mic.listening { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #f87171; }
</style>
</head>
<body>

<div id="status-strip">
  <div id="status-inner">
    <span class="s-dot"></span>
    <span id="status-text">thinking</span>
    <span class="dots"><span></span><span></span><span></span></span>
    <span class="stream-bar"><span class="stream-bar-fill"></span></span>
  </div>
</div>

<div id="bar">
  <div id="dot" title="OpenClaw status"></div>
  <div id="input-wrap">
    <input id="prompt" type="text" placeholder="What do you want to achieve?" autocomplete="off" autofocus>
  </div>
  <button id="send">Send</button>
  <button id="mic" title="Voice input">🎙</button>
</div>

<script>
const dot         = document.getElementById("dot");
const input       = document.getElementById("prompt");
const mic         = document.getElementById("mic");
const strip       = document.getElementById("status-strip");
const statusText  = document.getElementById("status-text");
const dots        = document.querySelector(".dots");
const streamBar   = document.querySelector(".stream-bar");
let ws = null;
let seqId = 1;

function showStatus(state) {
  // state: "thinking" | "responding" | null
  if (!state) {
    strip.classList.remove("active");
    return;
  }
  statusText.textContent = state;
  dots.style.display     = state === "thinking"   ? "inline" : "none";
  streamBar.style.display = state === "responding" ? "inline-block" : "none";
  strip.classList.add("active");
}

function connect() {
  ws = new WebSocket("ws://127.0.0.1:18790");

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === "bridge.status") {
      dot.className = msg.status === "connected" ? "ok" : "off";
      dot.title = "OpenClaw: " + msg.status;
      if (msg.status !== "connected") showStatus(null);
      return;
    }

    if (msg.type === "event" && msg.event === "agent" && msg.payload) {
      const p = msg.payload;
      if (p.stream === "lifecycle") {
        if (p.data?.phase === "start") showStatus("thinking");
        if (p.data?.phase === "end")   showStatus(null);
      }
      if (p.stream === "assistant" && p.data?.delta) {
        showStatus("responding");
      }
    }

    if (msg.type === "event" && msg.event === "chat" && msg.payload?.state === "final") {
      showStatus(null);
    }
  };

  ws.onopen  = () => { dot.title = "bridge: connected"; };
  ws.onclose = () => { dot.className = "off"; showStatus(null); setTimeout(connect, 3000); };
  ws.onerror = () => { dot.className = "off"; };
}

function sendPrompt() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  const id = "msg-" + Date.now() + "-" + (seqId++);
  ws.send(JSON.stringify({
    type:   "req",
    id:     id,
    method: "chat.send",
    params: {
      sessionKey:     "main",
      message:        "[UI] " + text,
      deliver:        false,
      idempotencyKey: id,
    }
  }));
  input.value = "";
  input.focus();
}

document.getElementById("send").onclick = sendPrompt;
input.addEventListener("keypress", e => { if (e.key === "Enter") sendPrompt(); });

mic.onclick = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Voice not supported in this browser."); return; }
  const r = new SR();
  r.lang = "en-US"; r.interimResults = false;
  mic.className = "listening";
  r.onresult = e => { input.value = e.results[0][0].transcript; input.focus(); mic.className = ""; };
  r.onerror  = () => { mic.className = ""; };
  r.onend    = () => { mic.className = ""; };
  r.start();
};

connect();
</script>
</body>
</html>
